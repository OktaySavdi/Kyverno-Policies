# ==============================================================================
# SECURITY POLICIES — Kyverno v1.17
# API: policies.kyverno.io/v1 | Kind: ValidatingPolicy
#
# Policies enforce container isolation, privilege restrictions, image trust,
# and registry allowlisting. All use CEL expressions.
# kube-system and kyverno namespaces are excluded via matchConditions.
#
# AUTO-FIX MODEL — MutatingPolicies in 05-mutate.yaml silently correct ALL
# security context fields BEFORE these ValidatingPolicies run. Developers are
# NEVER blocked for missing or incorrect security context — the mutation layer
# always fixes it automatically.
#
# These ValidatingPolicies ONLY enforce things that cannot be safely auto-fixed:
#   • disallow-latest-tag            — pinned semver/digest required
#   • restrict-image-registries      — supply-chain trust boundary
#   • disallow-host-namespaces       — hostNetwork/PID/IPC must never be allowed
#   • disallow-host-ports            — node IP binding must never be allowed
#   • disallow-share-process-namespace
#   • disallow-secrets-from-env      — secret data must not leak via env
#   • disallow-unsafe-sysctls        — kernel parameter safety
# ==============================================================================

---
# ------------------------------------------------------------------------------
# POLICY 1: Disallow Latest Image Tag
# :latest is mutable — different nodes may pull different images at different
# times, breaking reproducibility and rollback. Pin to a semver tag or digest.
# ------------------------------------------------------------------------------
apiVersion: policies.kyverno.io/v1
kind: ValidatingPolicy
metadata:
  name: disallow-latest-tag
  annotations:
    policies.kyverno.io/title: Disallow Latest Image Tag
    policies.kyverno.io/category: Security
    policies.kyverno.io/severity: medium
    policies.kyverno.io/description: >-
      The :latest tag is mutable and non-deterministic. Pin to a specific
      semver tag or image digest for reproducible deployments.
spec:
  validationActions: [Deny]
  matchConstraints:
    resourceRules:
      - apiGroups: [""]
        apiVersions: ["v1"]
        operations: ["CREATE", "UPDATE"]
        resources: ["pods"]
  matchConditions:
    - name: exclude-system-namespaces
      expression: >-
        !(request.namespace in [
          "kube-system", "kube-public", "default", "kube-node-lease",
          "kyverno", "argocd", "tanzu-package-repo-global", "tanzu-system",
          "vmware-system-auth", "vmware-system-cloud-provider",
          "vmware-system-csi", "vmware-system-tmc",
          "kubernetes-dashboard", "velero", "gatekeeper-system",
          "flux-system", "nginx-ingress", "monitoring", "calico-system",
          "istio-operator", "istio-system", "logging", "vault",
          "atlantis", "wiz", "kube-policy"])
  validations:
    - expression: >-
        object.spec.containers.all(c,
          !c.image.endsWith(":latest") &&
          c.image.contains(":")
        )
      message: >-
        Images must not use :latest tag and must specify a tag or digest.
        Use image:1.2.3 or image@sha256:... format.
    - expression: >-
        !has(object.spec.initContainers) ||
        object.spec.initContainers.all(c,
          !c.image.endsWith(":latest") &&
          c.image.contains(":")
        )
      message: "initContainer images must not use :latest and must include a tag."

---
# ------------------------------------------------------------------------------
# POLICY 2: Restrict Allowed Container Registries
# Pulling from untrusted public registries exposes the cluster to supply-chain
# attacks. Restrict images to approved internal/trusted registries only.
# Update the allowlist below to match your organisation's registries.
# ------------------------------------------------------------------------------
apiVersion: policies.kyverno.io/v1
kind: ValidatingPolicy
metadata:
  name: restrict-image-registries
  annotations:
    policies.kyverno.io/title: Restrict Image Registries
    policies.kyverno.io/category: Security
    policies.kyverno.io/severity: high
    policies.kyverno.io/description: >-
      Images must only be pulled from approved registries to prevent
      supply-chain attacks via unverified third-party images.
spec:
  validationActions: [Audit]
  matchConstraints:
    resourceRules:
      - apiGroups: [""]
        apiVersions: ["v1"]
        operations: ["CREATE", "UPDATE"]
        resources: ["pods"]
  matchConditions:
    - name: exclude-system-namespaces
      expression: >-
        !(request.namespace in [
          "kube-system", "kube-public", "default", "kube-node-lease",
          "kyverno", "argocd", "tanzu-package-repo-global", "tanzu-system",
          "vmware-system-auth", "vmware-system-cloud-provider",
          "vmware-system-csi", "vmware-system-tmc",
          "kubernetes-dashboard", "velero", "gatekeeper-system",
          "flux-system", "nginx-ingress", "monitoring", "calico-system",
          "istio-operator", "istio-system", "logging", "vault",
          "atlantis", "wiz", "kube-policy"])
  variables:
    - name: allowedRegistries
      expression: >-
        ["myacr.azurecr.io/", "gcr.io/distroless/", "registry.k8s.io/"]
  validations:
    - expression: >-
        object.spec.containers.all(c,
          variables.allowedRegistries.exists(reg, c.image.startsWith(reg))
        )
      messageExpression: >-
        "Image '" + object.spec.containers.filter(c,
          !variables.allowedRegistries.exists(reg, c.image.startsWith(reg))
        )[0].image + "' is not from an allowed registry. Allowed: myacr.azurecr.io/, gcr.io/distroless/, registry.k8s.io/"
    - expression: >-
        !has(object.spec.initContainers) ||
        object.spec.initContainers.all(c,
          variables.allowedRegistries.exists(reg, c.image.startsWith(reg))
        )
      message: "initContainer images must be from an allowed registry."

---
# ------------------------------------------------------------------------------
# POLICY 3: Disallow Host Namespaces (hostNetwork, hostPID, hostIPC)
# Sharing the host's network, PID, or IPC namespace breaks container isolation
# just as thoroughly as privileged mode. A container with hostNetwork can sniff
# all node traffic; hostPID can signal any process; hostIPC can access shared
# memory segments. All three must be explicitly blocked.
# ------------------------------------------------------------------------------
apiVersion: policies.kyverno.io/v1
kind: ValidatingPolicy
metadata:
  name: disallow-host-namespaces
  annotations:
    policies.kyverno.io/title: Disallow Host Namespaces
    policies.kyverno.io/category: Security
    policies.kyverno.io/severity: critical
    policies.kyverno.io/description: >-
      hostNetwork, hostPID, and hostIPC break container isolation. Blocks any
      pod that requests access to host-level namespaces.
spec:
  validationActions: [Deny]
  matchConstraints:
    resourceRules:
      - apiGroups: [""]
        apiVersions: ["v1"]
        operations: ["CREATE", "UPDATE"]
        resources: ["pods"]
  matchConditions:
    - name: exclude-system-namespaces
      expression: >-
        !(request.namespace in [
          "kube-system", "kube-public", "default", "kube-node-lease",
          "kyverno", "argocd", "tanzu-package-repo-global", "tanzu-system",
          "vmware-system-auth", "vmware-system-cloud-provider",
          "vmware-system-csi", "vmware-system-tmc",
          "kubernetes-dashboard", "velero", "gatekeeper-system",
          "flux-system", "nginx-ingress", "monitoring", "calico-system",
          "istio-operator", "istio-system", "logging", "vault",
          "atlantis", "wiz", "kube-policy"])
  validations:
    - expression: >-
        !has(object.spec.hostNetwork) || object.spec.hostNetwork == false
      message: "hostNetwork: true is not allowed. Containers must use the pod network namespace."
    - expression: >-
        !has(object.spec.hostPID) || object.spec.hostPID == false
      message: "hostPID: true is not allowed. Containers must not share the host PID namespace."
    - expression: >-
        !has(object.spec.hostIPC) || object.spec.hostIPC == false
      message: "hostIPC: true is not allowed. Containers must not share the host IPC namespace."

---
# ------------------------------------------------------------------------------
# POLICY 4: Disallow Host Ports
# hostPort binds a container port directly on the node IP, bypassing Services,
# Ingress controllers, and WAFs. It also limits scheduling (only one pod per
# node for that port). Use ClusterIP Services + Ingress instead.
# ------------------------------------------------------------------------------
apiVersion: policies.kyverno.io/v1
kind: ValidatingPolicy
metadata:
  name: disallow-host-ports
  annotations:
    policies.kyverno.io/title: Disallow Host Ports
    policies.kyverno.io/category: Security
    policies.kyverno.io/severity: high
    policies.kyverno.io/description: >-
      hostPort binds directly to node IPs, bypassing Ingress and limiting
      scheduling. Use ClusterIP Services and Ingress for external access.
spec:
  validationActions: [Deny]
  matchConstraints:
    resourceRules:
      - apiGroups: [""]
        apiVersions: ["v1"]
        operations: ["CREATE", "UPDATE"]
        resources: ["pods"]
  matchConditions:
    - name: exclude-system-namespaces
      expression: >-
        !(request.namespace in [
          "kube-system", "kube-public", "default", "kube-node-lease",
          "kyverno", "argocd", "tanzu-package-repo-global", "tanzu-system",
          "vmware-system-auth", "vmware-system-cloud-provider",
          "vmware-system-csi", "vmware-system-tmc",
          "kubernetes-dashboard", "velero", "gatekeeper-system",
          "flux-system", "nginx-ingress", "monitoring", "calico-system",
          "istio-operator", "istio-system", "logging", "vault",
          "atlantis", "wiz", "kube-policy"])
  validations:
    - expression: >-
        object.spec.containers.all(c,
          !has(c.ports) ||
          c.ports.all(p, !has(p.hostPort) || p.hostPort == 0)
        )
      message: "hostPort is not allowed. Use a Service and Ingress for external access."
    - expression: >-
        !has(object.spec.initContainers) ||
        object.spec.initContainers.all(c,
          !has(c.ports) ||
          c.ports.all(p, !has(p.hostPort) || p.hostPort == 0)
        )
      message: "hostPort is not allowed in initContainers."

---
# ------------------------------------------------------------------------------
# POLICY 5: Disallow shareProcessNamespace
# shareProcessNamespace: true lets all containers in a pod see each other's
# processes. An attacker in one container can inspect, signal, or inject into
# processes of sidecar containers (e.g., Envoy, Vault agent).
# ------------------------------------------------------------------------------
apiVersion: policies.kyverno.io/v1
kind: ValidatingPolicy
metadata:
  name: disallow-share-process-namespace
  annotations:
    policies.kyverno.io/title: Disallow shareProcessNamespace
    policies.kyverno.io/category: Security
    policies.kyverno.io/severity: medium
    policies.kyverno.io/description: >-
      shareProcessNamespace lets containers see and signal each other's PIDs,
      enabling cross-container process injection attacks.
spec:
  validationActions: [Deny]
  matchConstraints:
    resourceRules:
      - apiGroups: [""]
        apiVersions: ["v1"]
        operations: ["CREATE", "UPDATE"]
        resources: ["pods"]
  matchConditions:
    - name: exclude-system-namespaces
      expression: >-
        !(request.namespace in [
          "kube-system", "kube-public", "default", "kube-node-lease",
          "kyverno", "argocd", "tanzu-package-repo-global", "tanzu-system",
          "vmware-system-auth", "vmware-system-cloud-provider",
          "vmware-system-csi", "vmware-system-tmc",
          "kubernetes-dashboard", "velero", "gatekeeper-system",
          "flux-system", "nginx-ingress", "monitoring", "calico-system",
          "istio-operator", "istio-system", "logging", "vault",
          "atlantis", "wiz", "kube-policy"])
  validations:
    - expression: >-
        !has(object.spec.shareProcessNamespace) ||
        object.spec.shareProcessNamespace == false
      message: "shareProcessNamespace: true is not allowed. Containers must use isolated PID namespaces."

---
# ------------------------------------------------------------------------------
# POLICY 6: Disallow Secrets in Environment Variables
# Injecting secrets via environment variables can leak them into crash dumps,
# logs, and process listings (e.g. via /proc/1/environ or `ps`).
# Mount secrets as read-only volumes instead.
# ------------------------------------------------------------------------------
apiVersion: policies.kyverno.io/v1
kind: ValidatingPolicy
metadata:
  name: disallow-secrets-from-env
  annotations:
    policies.kyverno.io/title: Disallow Secrets from Env
    policies.kyverno.io/category: Security
    policies.kyverno.io/description: >-
      Prohibits passing Secret data via environment variables using
      valueFrom.secretKeyRef or envFrom.secretRef. Secrets must be mounted as
      read-only volumes to avoid leaking into logs and process listings.
spec:
  validationActions: [Deny]
  matchConstraints:
    resourceRules:
      - apiGroups: [""]
        apiVersions: ["v1"]
        operations: ["CREATE", "UPDATE"]
        resources: ["pods"]
  matchConditions:
    - name: exclude-system-namespaces
      expression: >-
        !(request.namespace in [
          "kube-system", "kube-public", "default", "kube-node-lease",
          "kyverno", "argocd", "tanzu-package-repo-global", "tanzu-system",
          "vmware-system-auth", "vmware-system-cloud-provider",
          "vmware-system-csi", "vmware-system-tmc",
          "kubernetes-dashboard", "velero", "gatekeeper-system",
          "flux-system", "nginx-ingress", "monitoring", "calico-system",
          "istio-operator", "istio-system", "logging", "vault",
          "atlantis", "wiz", "kube-policy"])
  validations:
    - expression: >-
        !has(object.spec.containers) ||
        object.spec.containers.all(c,
          !has(c.env) ||
          !c.env.exists(e, has(e.valueFrom) && has(e.valueFrom.secretKeyRef))
        )
      message: >-
        Secrets must not be injected via env[].valueFrom.secretKeyRef.
        Mount them as read-only volumes instead to avoid leaking into logs/process listings.
    - expression: >-
        !has(object.spec.containers) ||
        object.spec.containers.all(c,
          !has(c.envFrom) ||
          !c.envFrom.exists(e, has(e.secretRef))
        )
      message: >-
        Secrets must not be injected via envFrom[].secretRef.
        Mount them as read-only volumes instead.
    - expression: >-
        !has(object.spec.initContainers) ||
        object.spec.initContainers.all(c,
          !has(c.env) ||
          !c.env.exists(e, has(e.valueFrom) && has(e.valueFrom.secretKeyRef))
        )
      message: "initContainers must not use env[].valueFrom.secretKeyRef."
    - expression: >-
        !has(object.spec.initContainers) ||
        object.spec.initContainers.all(c,
          !has(c.envFrom) ||
          !c.envFrom.exists(e, has(e.secretRef))
        )
      message: "initContainers must not use envFrom[].secretRef."

---
# ------------------------------------------------------------------------------
# POLICY 7: Disallow Unsafe Sysctls
# Prevents containers from modifying kernel parameters at the Pod level beyond
# the safe subset defined by Kubernetes. Unsafe sysctls can destabilise the
# whole node (they share the kernel namespace).
# Safe sysctls (kernel.shm_rmid_forced, net.ipv4.tcp_syncookies,
#   net.ipv4.ping_group_range, net.ipv4.ip_unprivileged_port_start) are allowed.
# ------------------------------------------------------------------------------
apiVersion: policies.kyverno.io/v1
kind: ValidatingPolicy
metadata:
  name: disallow-unsafe-sysctls
  annotations:
    policies.kyverno.io/title: Disallow Unsafe Sysctls
    policies.kyverno.io/category: Security
    policies.kyverno.io/description: >-
      Ensures that only Kubernetes-designated safe sysctls can be set in a
      Pod's securityContext. Blocking unknown or unsafe sysctls protects node
      stability and prevents kernel namespace tampering.
spec:
  validationActions: [Deny]
  matchConstraints:
    resourceRules:
      - apiGroups: [""]
        apiVersions: ["v1"]
        operations: ["CREATE", "UPDATE"]
        resources: ["pods"]
  matchConditions:
    - name: exclude-system-namespaces
      expression: >-
        !(request.namespace in [
          "kube-system", "kube-public", "default", "kube-node-lease",
          "kyverno", "argocd", "tanzu-package-repo-global", "tanzu-system",
          "vmware-system-auth", "vmware-system-cloud-provider",
          "vmware-system-csi", "vmware-system-tmc",
          "kubernetes-dashboard", "velero", "gatekeeper-system",
          "flux-system", "nginx-ingress", "monitoring", "calico-system",
          "istio-operator", "istio-system", "logging", "vault",
          "atlantis", "wiz", "kube-policy"])
  validations:
    - expression: >-
        !has(object.spec.securityContext) ||
        !has(object.spec.securityContext.sysctls) ||
        object.spec.securityContext.sysctls.all(s,
          s.name == "kernel.shm_rmid_forced" ||
          s.name.startsWith("net.ipv4.tcp_syncookies") ||
          s.name.startsWith("net.ipv4.ping_group_range") ||
          s.name.startsWith("net.ipv4.ip_unprivileged_port_start")
        )
      message: >-
        Only safe sysctls are permitted: kernel.shm_rmid_forced,
        net.ipv4.tcp_syncookies, net.ipv4.ping_group_range,
        net.ipv4.ip_unprivileged_port_start.
        All other sysctls may compromise node stability and are disallowed.
