# ==============================================================================
# MUTATE POLICIES — Kyverno v1.17
# API: policies.kyverno.io/v1 | Kind: MutatingPolicy
#
# Automatically patch resources at admission time to inject defaults.
# This reduces boilerplate, enforces consistency, and ensures every workload
# has sensible baseline values even when developers forget to set them.
#
# MutatingPolicy uses CEL with ApplyConfiguration (Object{}) or JSONPatch{}.
# Mutations run BEFORE ValidatingPolicy checks, so mutated values satisfy
# validation rules automatically.
# ==============================================================================

---
# ------------------------------------------------------------------------------
# POLICY 1: Add Standard Labels
# Injects team, env, and managed-by labels onto Pods and Deployments that do
# not already have them. Ensures every workload is attributable and filterable
# without requiring developers to remember to add boilerplate metadata.
#
# Logic: only injects labels that are missing — does not overwrite existing ones.
# ------------------------------------------------------------------------------
apiVersion: policies.kyverno.io/v1
kind: MutatingPolicy
metadata:
  name: mutate-add-standard-labels
  annotations:
    policies.kyverno.io/title: Add Standard Labels
    policies.kyverno.io/category: Mutate
    policies.kyverno.io/description: >-
      Automatically injects managed-by: kyverno label onto Pods and Deployments
      that do not already have it. Provides baseline operational metadata even
      when developers omit it.
spec:
  matchConstraints:
    resourceRules:
      - apiGroups: ["", "apps"]
        apiVersions: ["v1"]
        operations: ["CREATE"]
        resources: ["pods", "deployments"]
  matchConditions:
    - name: exclude-system-namespaces
      expression: >-
        !(request.namespace in [
          "kube-system", "kube-public", "default", "kube-node-lease",
          "kyverno", "argocd", "tanzu-package-repo-global", "tanzu-system",
          "vmware-system-auth", "vmware-system-cloud-provider",
          "vmware-system-csi", "vmware-system-tmc",
          "kubernetes-dashboard", "velero", "gatekeeper-system",
          "flux-system", "nginx-ingress", "monitoring", "calico-system",
          "istio-operator", "istio-system", "logging", "vault",
          "atlantis", "wiz", "kube-policy"])
  mutations:
    # Inject managed-by label if missing
    - patchType: ApplyConfiguration
      applyConfiguration:
        expression: >-
          !(has(object.metadata.labels) && has(object.metadata.labels["managed-by"])) ?
          Object{
            metadata: Object.metadata{
              labels: Object.metadata.labels{
                "managed-by": "kyverno"
              }
            }
          } : Object{}
    # Inject env: unknown if there is no env label (sentinel for governance audit)
    - patchType: ApplyConfiguration
      applyConfiguration:
        expression: >-
          !(has(object.metadata.labels) && has(object.metadata.labels.env)) ?
          Object{
            metadata: Object.metadata{
              labels: Object.metadata.labels{
                env: "unknown"
              }
            }
          } : Object{}

---
# ------------------------------------------------------------------------------
# POLICY 2: Add Default Resource Limits
# Containers submitted without resource limits will have sensible defaults
# injected automatically. This prevents BestEffort QoS and potential
# noisy-neighbour OOMKill events while teams migrate to explicit limits.
#
# Defaults:   CPU request: 100m
#             Memory request: 128Mi | Memory limit: 512Mi
#
# If a container already has limits set, this mutation does NOT overwrite them.
# Promote this policy to set tighter defaults once teams begin specifying their own.
# ------------------------------------------------------------------------------
apiVersion: policies.kyverno.io/v1
kind: MutatingPolicy
metadata:
  name: mutate-add-default-resource-limits
  annotations:
    policies.kyverno.io/title: Add Default Resource Limits
    policies.kyverno.io/category: Mutate
    policies.kyverno.io/description: >-
      Injects default CPU/memory requests and limits for containers missing them.
      Prevents BestEffort QoS and noisy-neighbour resource exhaustion as a
      safety net during migration to explicit resource definitions.
spec:
  matchConstraints:
    resourceRules:
      - apiGroups: [""]
        apiVersions: ["v1"]
        operations: ["CREATE", "UPDATE"]
        resources: ["pods"]
  matchConditions:
    - name: exclude-system-namespaces
      expression: >-
        !(request.namespace in [
          "kube-system", "kube-public", "default", "kube-node-lease",
          "kyverno", "argocd", "tanzu-package-repo-global", "tanzu-system",
          "vmware-system-auth", "vmware-system-cloud-provider",
          "vmware-system-csi", "vmware-system-tmc",
          "kubernetes-dashboard", "velero", "gatekeeper-system",
          "flux-system", "nginx-ingress", "monitoring", "calico-system",
          "istio-operator", "istio-system", "logging", "vault",
          "atlantis", "wiz", "kube-policy"])
  mutations:
    # Inject default resource requests/limits per container — triggers when
    # EITHER requests or limits are missing (fixes alignment with validation
    # that requires both requests AND limits with cpu AND memory).
    - patchType: ApplyConfiguration
      applyConfiguration:
        expression: >-
          Object{
            spec: Object.spec{
              containers: object.spec.containers.map(c,
                !(has(c.resources) && has(c.resources.requests) && has(c.resources.requests.cpu) && has(c.resources.requests.memory) && has(c.resources.limits) && has(c.resources.limits.memory)) ?
                Object.spec.containers{
                  name: c.name,
                  resources: Object.spec.containers.resources{
                    requests: Object.spec.containers.resources.requests{
                      cpu: "100m",
                      memory: "128Mi"
                    },
                    limits: Object.spec.containers.resources.limits{
                      memory: "512Mi"
                    }
                  }
                } :
                Object.spec.containers{
                  name: c.name
                }
              )
            }
          }

---
# ------------------------------------------------------------------------------
# POLICY 4: Auto-inject securityContext — allowPrivilegeEscalation: false
# Automatically sets allowPrivilegeEscalation: false on every container that
# does not already define it. Works in tandem with the ValidatingPolicy in
# 01-security.yaml: the mutation runs first so the validation always passes.
# Containers that already have the field set explicitly are left untouched.
# ------------------------------------------------------------------------------
apiVersion: policies.kyverno.io/v1
kind: MutatingPolicy
metadata:
  name: mutate-set-allow-privilege-escalation-false
  annotations:
    policies.kyverno.io/title: Auto-inject allowPrivilegeEscalation false
    policies.kyverno.io/category: Security Mutate
    policies.kyverno.io/description: >-
      Always sets securityContext.allowPrivilegeEscalation: false on containers
      that either don't have the field OR have it explicitly set to true.
      Developers are never blocked — the policy silently corrects the value.
spec:
  matchConstraints:
    resourceRules:
      - apiGroups: [""]
        apiVersions: ["v1"]
        operations: ["CREATE", "UPDATE"]
        resources: ["pods"]
  matchConditions:
    - name: exclude-system-namespaces
      expression: >-
        !(request.namespace in [
          "kube-system", "kube-public", "default", "kube-node-lease",
          "kyverno", "argocd", "tanzu-package-repo-global", "tanzu-system",
          "vmware-system-auth", "vmware-system-cloud-provider",
          "vmware-system-csi", "vmware-system-tmc",
          "kubernetes-dashboard", "velero", "gatekeeper-system",
          "flux-system", "nginx-ingress", "monitoring", "calico-system",
          "istio-operator", "istio-system", "logging", "vault",
          "atlantis", "wiz", "kube-policy"])
  mutations:
    - patchType: ApplyConfiguration
      applyConfiguration:
        expression: >-
          Object{
            spec: Object.spec{
              containers: object.spec.containers.map(c,
                !has(c.securityContext) || !has(c.securityContext.allowPrivilegeEscalation) || c.securityContext.allowPrivilegeEscalation == true ?
                Object.spec.containers{
                  name: c.name,
                  securityContext: Object.spec.containers.securityContext{
                    allowPrivilegeEscalation: false
                  }
                } :
                Object.spec.containers{ name: c.name }
              )
            }
          }

---
# ------------------------------------------------------------------------------
# POLICY 4a: Auto-inject securityContext — privileged: false
# Always sets securityContext.privileged: false on every container that either
# does not define the field OR has it explicitly set to true.
