metadata:
  name: mutate-set-privileged-false
  annotations:
    policies.kyverno.io/title: Auto-inject privileged false
    policies.kyverno.io/category: Security Mutate
    policies.kyverno.io/description: >-
      Always sets securityContext.privileged: false on containers that either
      don't have the field OR have it explicitly set to true. Developers are
      never blocked — the policy silently corrects the value.
spec:
  matchConstraints:
    resourceRules:
      - apiGroups: [""]
        apiVersions: ["v1"]
        operations: ["CREATE", "UPDATE"]
        resources: ["pods"]
  matchConditions:
    - name: exclude-system-namespaces
      expression: >-
        !(request.namespace in [
          "kube-system", "kube-public", "default", "kube-node-lease",
          "kyverno", "argocd", "tanzu-package-repo-global", "tanzu-system",
          "vmware-system-auth", "vmware-system-cloud-provider",
          "vmware-system-csi", "vmware-system-tmc",
          "kubernetes-dashboard", "velero", "gatekeeper-system",
          "flux-system", "nginx-ingress", "monitoring", "calico-system",
          "istio-operator", "istio-system", "logging", "vault",
          "atlantis", "wiz", "kube-policy"])
  mutations:
    - patchType: ApplyConfiguration
      applyConfiguration:
        expression: >-
          Object{
            spec: Object.spec{
              containers: object.spec.containers.map(c,
                !has(c.securityContext) || !has(c.securityContext.privileged) || c.securityContext.privileged == true ?
                Object.spec.containers{
                  name: c.name,
                  securityContext: Object.spec.containers.securityContext{
                    privileged: false
                  }
                } :
                Object.spec.containers{ name: c.name }
              )
            }
          }

---
# ------------------------------------------------------------------------------
# POLICY 5: Auto-inject securityContext — readOnlyRootFilesystem: true
# Automatically sets readOnlyRootFilesystem: true on every container that does
# not already define it. Prevents malware persistence and binary tampering.
# Note: apps that write to the root filesystem will need an emptyDir or PVC
# volumeMount — this mutation surfaces that requirement early.
# ------------------------------------------------------------------------------
apiVersion: policies.kyverno.io/v1
kind: MutatingPolicy
metadata:
  name: mutate-set-readonly-root-filesystem
  annotations:
    policies.kyverno.io/title: Auto-inject readOnlyRootFilesystem true
    policies.kyverno.io/category: Security Mutate
    policies.kyverno.io/description: >-
      Always sets securityContext.readOnlyRootFilesystem: true on containers
      that either don't have the field OR have it explicitly set to false.
      Developers are never blocked — the policy silently corrects the value.
spec:
  matchConstraints:
    resourceRules:
      - apiGroups: [""]
        apiVersions: ["v1"]
        operations: ["CREATE", "UPDATE"]
        resources: ["pods"]
  matchConditions:
    - name: exclude-system-namespaces
      expression: >-
        !(request.namespace in [
          "kube-system", "kube-public", "default", "kube-node-lease",
          "kyverno", "argocd", "tanzu-package-repo-global", "tanzu-system",
          "vmware-system-auth", "vmware-system-cloud-provider",
          "vmware-system-csi", "vmware-system-tmc",
          "kubernetes-dashboard", "velero", "gatekeeper-system",
          "flux-system", "nginx-ingress", "monitoring", "calico-system",
          "istio-operator", "istio-system", "logging", "vault",
          "atlantis", "wiz", "kube-policy"])
  mutations:
    - patchType: ApplyConfiguration
      applyConfiguration:
        expression: >-
          Object{
            spec: Object.spec{
              containers: object.spec.containers.map(c,
                !has(c.securityContext) || !has(c.securityContext.readOnlyRootFilesystem) || c.securityContext.readOnlyRootFilesystem == false ?
                Object.spec.containers{
                  name: c.name,
                  securityContext: Object.spec.containers.securityContext{
                    readOnlyRootFilesystem: true
                  }
                } :
                Object.spec.containers{ name: c.name }
              )
            }
          }

---
# ------------------------------------------------------------------------------
# POLICY 6: Auto-inject securityContext — capabilities.drop: ["ALL"]
# Automatically drops all Linux capabilities on containers that have no
# capabilities block defined. This enforces the least-privilege kernel surface
# without requiring every developer to remember the securityContext syntax.
# Apps that legitimately need a capability (e.g. NET_BIND_SERVICE) must
# explicitly add it back via capabilities.add — making the need visible in code.
# ------------------------------------------------------------------------------
apiVersion: policies.kyverno.io/v1
kind: MutatingPolicy
metadata:
  name: mutate-drop-all-capabilities
  annotations:
    policies.kyverno.io/title: Auto-inject capabilities.drop ALL
    policies.kyverno.io/category: Security Mutate
    policies.kyverno.io/description: >-
      Always ensures securityContext.capabilities.drop includes ALL on containers
      that either have no capabilities block OR have one that is missing drop:ALL.
      A container that adds specific capabilities (e.g. NET_BIND_SERVICE) will
      still have drop:ALL merged in, following least-privilege principle.
      Developers are never blocked — the policy silently adds the missing drop.
spec:
  matchConstraints:
    resourceRules:
      - apiGroups: [""]
        apiVersions: ["v1"]
        operations: ["CREATE", "UPDATE"]
        resources: ["pods"]
  matchConditions:
    - name: exclude-system-namespaces
      expression: >-
        !(request.namespace in [
          "kube-system", "kube-public", "default", "kube-node-lease",
          "kyverno", "argocd", "tanzu-package-repo-global", "tanzu-system",
          "vmware-system-auth", "vmware-system-cloud-provider",
          "vmware-system-csi", "vmware-system-tmc",
          "kubernetes-dashboard", "velero", "gatekeeper-system",
          "flux-system", "nginx-ingress", "monitoring", "calico-system",
          "istio-operator", "istio-system", "logging", "vault",
          "atlantis", "wiz", "kube-policy"])
  mutations:
    - patchType: ApplyConfiguration
      applyConfiguration:
        expression: >-
          Object{
            spec: Object.spec{
              containers: object.spec.containers.map(c,
                !has(c.securityContext) || !has(c.securityContext.capabilities) ||
                !(has(c.securityContext.capabilities.drop) && c.securityContext.capabilities.drop.exists(cap, cap == "ALL")) ?
                Object.spec.containers{
                  name: c.name,
                  securityContext: Object.spec.containers.securityContext{
                    capabilities: Object.spec.containers.securityContext.capabilities{
                      drop: ["ALL"]
                    }
                  }
                } :
                Object.spec.containers{ name: c.name }
              )
            }
          }

---
# ------------------------------------------------------------------------------
# POLICY 7: Auto-inject securityContext — runAsNonRoot: true + runAsUser: 65534
# Always sets runAsNonRoot: true at pod level.
# Sets runAsUser: 65534 (nobody) ONLY if missing or explicitly set to 0 (root).
# If a developer already set a non-zero runAsUser, it is left untouched.
# Developers are never blocked — the policy silently corrects the values.
# ------------------------------------------------------------------------------
apiVersion: policies.kyverno.io/v1
kind: MutatingPolicy
metadata:
  name: mutate-set-run-as-non-root
  annotations:
    policies.kyverno.io/title: Auto-inject runAsNonRoot and runAsUser
    policies.kyverno.io/category: Security Mutate
    policies.kyverno.io/description: >-
      Always sets pod-level securityContext.runAsNonRoot: true. Sets
      runAsUser: 65534 (nobody) when it is missing or explicitly 0. If
      the developer set a non-zero UID, it is preserved. Developers are
      never blocked — the policy silently corrects the values.
spec:
  matchConstraints:
    resourceRules:
      - apiGroups: [""]
        apiVersions: ["v1"]
        operations: ["CREATE", "UPDATE"]
        resources: ["pods"]
  matchConditions:
    - name: exclude-system-namespaces
      expression: >-
        !(request.namespace in [
          "kube-system", "kube-public", "default", "kube-node-lease",
          "kyverno", "argocd", "tanzu-package-repo-global", "tanzu-system",
          "vmware-system-auth", "vmware-system-cloud-provider",
          "vmware-system-csi", "vmware-system-tmc",
          "kubernetes-dashboard", "velero", "gatekeeper-system",
          "flux-system", "nginx-ingress", "monitoring", "calico-system",
          "istio-operator", "istio-system", "logging", "vault",
          "atlantis", "wiz", "kube-policy"])
  mutations:
    # Always ensure runAsNonRoot: true (overwrite false if explicitly set)
    - patchType: ApplyConfiguration
      applyConfiguration:
        expression: >-
          !has(object.spec.securityContext) || !has(object.spec.securityContext.runAsNonRoot) || object.spec.securityContext.runAsNonRoot == false ?
          Object{
            spec: Object.spec{
              securityContext: Object.spec.securityContext{
                runAsNonRoot: true
              }
            }
          } : Object{}
    # Set runAsUser: 65534 only when missing or explicitly 0 (root)
    - patchType: ApplyConfiguration
      applyConfiguration:
        expression: >-
          !has(object.spec.securityContext) || !has(object.spec.securityContext.runAsUser) || object.spec.securityContext.runAsUser == 0 ?
          Object{
            spec: Object.spec{
              securityContext: Object.spec.securityContext{
                runAsUser: 65534
              }
            }
          } : Object{}

---
# ------------------------------------------------------------------------------
# POLICY 8: Auto-inject Seccomp Profile RuntimeDefault
# Without a seccomp profile containers have access to ~300+ Linux syscalls.
# Pod Security Standard "Restricted" requires RuntimeDefault or Localhost.
# This mutation injects RuntimeDefault when the field is absent AND also
# overwrites an explicit Unconfined value. Developers are never blocked.
# ------------------------------------------------------------------------------
apiVersion: policies.kyverno.io/v1
kind: MutatingPolicy
metadata:
  name: mutate-set-seccomp-runtime-default
  annotations:
    policies.kyverno.io/title: Auto-inject Seccomp RuntimeDefault
    policies.kyverno.io/category: Security Mutate
    policies.kyverno.io/description: >-
      Sets pod-level seccompProfile.type: RuntimeDefault when no seccomp
      profile is defined OR when it is explicitly set to Unconfined.
      Developers are never blocked — the policy silently corrects the value.
spec:
  matchConstraints:
    resourceRules:
      - apiGroups: [""]
        apiVersions: ["v1"]
        operations: ["CREATE", "UPDATE"]
        resources: ["pods"]
  matchConditions:
    - name: exclude-system-namespaces
      expression: >-
        !(request.namespace in [
          "kube-system", "kube-public", "default", "kube-node-lease",
          "kyverno", "argocd", "tanzu-package-repo-global", "tanzu-system",
          "vmware-system-auth", "vmware-system-cloud-provider",
          "vmware-system-csi", "vmware-system-tmc",
          "kubernetes-dashboard", "velero", "gatekeeper-system",
          "flux-system", "nginx-ingress", "monitoring", "calico-system",
          "istio-operator", "istio-system", "logging", "vault",
          "atlantis", "wiz", "kube-policy"])
    - name: needs-seccomp-fix
      expression: >-
        !has(object.spec.securityContext) ||
        !has(object.spec.securityContext.seccompProfile) ||
        object.spec.securityContext.seccompProfile.type == "Unconfined"
  mutations:
    - patchType: ApplyConfiguration
      applyConfiguration:
        expression: >-
          Object{
            spec: Object.spec{
              securityContext: Object.spec.securityContext{
                seccompProfile: Object.spec.securityContext.seccompProfile{
                  type: "RuntimeDefault"
                }
              }
            }
          }
