# ==============================================================================
# GENERATE POLICIES — Kyverno v1.17
# API: policies.kyverno.io/v1 | Kind: GeneratingPolicy
#
# These policies automatically CREATE downstream resources when a namespace is
# provisioned. This eliminates the human error of forgetting to create
# NetworkPolicy, ResourceQuota, or LimitRange — the three most critical
# cluster-governance resources. Automation scales; checklists don't.
#
# GeneratingPolicy uses:
#   generator.Apply(namespace, [resources]) to create resources
#   evaluation.synchronize.enabled: true   to keep them in sync
#   evaluation.generateExisting.enabled: true to backfill existing namespaces
# ==============================================================================

---
# ------------------------------------------------------------------------------
# POLICY 1: Generate Default-Deny NetworkPolicy
# By default Kubernetes allows all pod-to-pod traffic. Every new namespace gets
# a default-deny-ingress NetworkPolicy automatically so that a compromised pod
# in namespace A cannot reach pods in namespace B without an explicit allow rule.
#
# Why automate: if left manual, developers often skip this step and the cluster
# has no network segmentation at all until an incident occurs.
# ------------------------------------------------------------------------------
apiVersion: policies.kyverno.io/v1
kind: GeneratingPolicy
metadata:
  name: generate-default-network-policy
  annotations:
    policies.kyverno.io/title: Generate Default NetworkPolicy
    policies.kyverno.io/category: Generate
    policies.kyverno.io/severity: high
    policies.kyverno.io/description: >-
      Auto-creates a default-deny-all NetworkPolicy in every new namespace.
      Prevents lateral movement between namespaces without an explicit allow rule.
spec:
  evaluation:
    synchronize:
      enabled: true
    generateExisting:
      enabled: true
  matchConstraints:
    resourceRules:
      - apiGroups: [""]
        apiVersions: ["v1"]
        operations: ["CREATE"]
        resources: ["namespaces"]
  matchConditions:
    - name: exclude-system-namespaces
      expression: >-
        !(object.metadata.name in [
          "kube-system", "kube-public", "default", "kube-node-lease",
          "kyverno", "argocd", "tanzu-package-repo-global", "tanzu-system",
          "vmware-system-auth", "vmware-system-cloud-provider",
          "vmware-system-csi", "vmware-system-tmc",
          "kubernetes-dashboard", "velero", "gatekeeper-system",
          "flux-system", "nginx-ingress", "monitoring", "calico-system",
          "istio-operator", "istio-system", "logging", "vault",
          "atlantis", "wiz", "kube-policy"])
  variables:
    - name: nsName
      expression: object.metadata.name
    - name: downstream
      expression: |
        [
          {
            "kind": dyn("NetworkPolicy"),
            "apiVersion": dyn("networking.k8s.io/v1"),
            "metadata": dyn({
              "name": "default-deny-all",
              "namespace": string(variables.nsName),
              "labels": dyn({
                "kyverno.io/generated": "true",
                "policy": "default-deny-all"
              })
            }),
            "spec": dyn({
              "podSelector": dyn({}),
              "policyTypes": dyn(["Ingress", "Egress"])
            })
          },
          {
            "kind": dyn("NetworkPolicy"),
            "apiVersion": dyn("networking.k8s.io/v1"),
            "metadata": dyn({
              "name": "allow-dns-egress",
              "namespace": string(variables.nsName),
              "labels": dyn({
                "kyverno.io/generated": "true",
                "policy": "allow-dns-egress"
              })
            }),
            "spec": dyn({
              "podSelector": dyn({}),
              "policyTypes": dyn(["Egress"]),
              "egress": dyn([
                {
                  "ports": dyn([
                    {"port": 53, "protocol": "UDP"},
                    {"port": 53, "protocol": "TCP"}
                  ])
                }
              ])
            })
          }
        ]
  generate:
    - expression: generator.Apply(variables.nsName, variables.downstream)

---
# ------------------------------------------------------------------------------
# POLICY 2: Generate ResourceQuota and LimitRange
# Without a ResourceQuota a namespace can consume unlimited cluster resources,
# starving other tenants. Without a LimitRange, pods without explicit resource
# requests/limits get BestEffort QoS and are the first evicted under pressure.
#
# Defaults (adjust per environment via Kustomize overlays or Helm values):
#   ResourceQuota: 8 CPUs, 16Gi memory, 20 pods
#   LimitRange:    default 200m/256Mi, max 2/2Gi per container
# ------------------------------------------------------------------------------
apiVersion: policies.kyverno.io/v1
kind: GeneratingPolicy
metadata:
  name: generate-resource-quota-limitrange
  annotations:
    policies.kyverno.io/title: Generate ResourceQuota and LimitRange
    policies.kyverno.io/category: Generate
    policies.kyverno.io/severity: high
    policies.kyverno.io/description: >-
      Auto-creates a ResourceQuota and LimitRange in every new namespace to
      cap resource consumption and assign default container limits, preventing
      BestEffort QoS and noisy-neighbour resource exhaustion.
spec:
  evaluation:
    synchronize:
      enabled: true
    generateExisting:
      enabled: true
  matchConstraints:
    resourceRules:
      - apiGroups: [""]
        apiVersions: ["v1"]
        operations: ["CREATE"]
        resources: ["namespaces"]
  matchConditions:
    - name: exclude-system-namespaces
      expression: >-
        !(object.metadata.name in [
          "kube-system", "kube-public", "default", "kube-node-lease",
          "kyverno", "argocd", "tanzu-package-repo-global", "tanzu-system",
          "vmware-system-auth", "vmware-system-cloud-provider",
          "vmware-system-csi", "vmware-system-tmc",
          "kubernetes-dashboard", "velero", "gatekeeper-system",
          "flux-system", "nginx-ingress", "monitoring", "calico-system",
          "istio-operator", "istio-system", "logging", "vault",
          "atlantis", "wiz", "kube-policy"])
  variables:
    - name: nsName
      expression: object.metadata.name
    - name: downstream
      expression: |
        [
          {
            "kind": dyn("ResourceQuota"),
            "apiVersion": dyn("v1"),
            "metadata": dyn({
              "name": "default-quota",
              "namespace": string(variables.nsName),
              "labels": dyn({
                "kyverno.io/generated": "true"
              })
            }),
            "spec": dyn({
              "hard": dyn({
                "requests.cpu": "8",
                "requests.memory": "16Gi",
                "limits.cpu": "16",
                "limits.memory": "32Gi",
                "pods": "40",
                "services": "20",
                "persistentvolumeclaims": "20",
                "secrets": "50",
                "configmaps": "50"
              })
            })
          },
          {
            "kind": dyn("LimitRange"),
            "apiVersion": dyn("v1"),
            "metadata": dyn({
              "name": "default-limitrange",
              "namespace": string(variables.nsName),
              "labels": dyn({
                "kyverno.io/generated": "true"
              })
            }),
            "spec": dyn({
              "limits": dyn([
                {
                  "type": "Container",
                  "default": dyn({
                    "cpu": "500m",
                    "memory": "512Mi"
                  }),
                  "defaultRequest": dyn({
                    "cpu": "100m",
                    "memory": "128Mi"
                  }),
                  "max": dyn({
                    "cpu": "2",
                    "memory": "2Gi"
                  }),
                  "min": dyn({
                    "cpu": "50m",
                    "memory": "64Mi"
                  })
                },
                {
                  "type": "PersistentVolumeClaim",
                  "max": dyn({
                    "storage": "50Gi"
                  }),
                  "min": dyn({
                    "storage": "1Gi"
                  })
                }
              ])
            })
          }
        ]
  generate:
    - expression: generator.Apply(variables.nsName, variables.downstream)
