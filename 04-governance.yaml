# ==============================================================================
# GOVERNANCE / CLUSTER POLICIES — Kyverno v1.17
# API: policies.kyverno.io/v1 | Kind: ValidatingPolicy
#
# Ensures namespaces are properly resourced, isolated, and that cluster-level
# hygiene rules are enforced. These policies apply at namespace/cluster scope.
#
# Policies in this file:
#   • restrict-default-namespace     — workloads must use named, governed namespaces
#   • disallow-nodeport-services     — NodePort bypasses Ingress and WAF controls
#   • require-namespace-owner-label  — every namespace must declare team + env
#   • require-ingress-tls            — all Ingress resources must configure TLS
#   • restrict-rbac-wildcards        — ClusterRoles must not use wildcard verbs/resources [Audit]
# ==============================================================================

---
# ------------------------------------------------------------------------------
# POLICY 1: Restrict Usage of Default Namespace
# The default namespace has no resource quotas, no network policy, and no
# team ownership. Deploying workloads there is an anti-pattern that leads to
# uncontrolled resource growth and poor security isolation.
# ------------------------------------------------------------------------------
apiVersion: policies.kyverno.io/v1
kind: ValidatingPolicy
metadata:
  name: restrict-default-namespace
  annotations:
    policies.kyverno.io/title: Restrict Default Namespace
    policies.kyverno.io/category: Governance
    policies.kyverno.io/severity: medium
    policies.kyverno.io/description: >-
      The default namespace has no quotas, no network policy, and no ownership.
      All workloads must use named, governed namespaces.
spec:
  validationActions: [Deny]
  matchConstraints:
    resourceRules:
      - apiGroups: ["", "apps", "batch"]
        apiVersions: ["v1"]
        operations: ["CREATE", "UPDATE"]
        resources:
          - pods
          - deployments
          - statefulsets
          - daemonsets
          - jobs
          - cronjobs
          - services
  matchConditions:
    - name: only-default-namespace
      expression: request.namespace == "default"
  validations:
    - expression: "false"
      message: >-
        The 'default' namespace must not be used for workloads.
        Create a dedicated namespace with ResourceQuota and NetworkPolicy.

---
# ------------------------------------------------------------------------------
# POLICY 2: Disallow NodePort Services
# NodePort exposes a Service on every node's IP at a static port, bypassing
# Ingress controllers, WAFs, and load-balancer-level security controls. Use
# ClusterIP with an Ingress, or a managed LoadBalancer instead.
# ------------------------------------------------------------------------------
apiVersion: policies.kyverno.io/v1
kind: ValidatingPolicy
metadata:
  name: disallow-nodeport-services
  annotations:
    policies.kyverno.io/title: Disallow NodePort Services
    policies.kyverno.io/category: Governance
    policies.kyverno.io/severity: medium
    policies.kyverno.io/description: >-
      NodePort bypasses Ingress controllers and security controls. Use ClusterIP
      with Ingress, or a cloud-managed LoadBalancer for external traffic.
spec:
  validationActions: [Deny]
  matchConstraints:
    resourceRules:
      - apiGroups: [""]
        apiVersions: ["v1"]
        operations: ["CREATE", "UPDATE"]
        resources: ["services"]
  matchConditions:
    - name: exclude-system-namespaces
      expression: >-
        !(request.namespace in [
          "kube-system", "kube-public", "default", "kube-node-lease",
          "kyverno", "argocd", "tanzu-package-repo-global", "tanzu-system",
          "vmware-system-auth", "vmware-system-cloud-provider",
          "vmware-system-csi", "vmware-system-tmc",
          "kubernetes-dashboard", "velero", "gatekeeper-system",
          "flux-system", "nginx-ingress", "monitoring", "calico-system",
          "istio-operator", "istio-system", "logging", "vault",
          "atlantis", "wiz", "kube-policy"])
  validations:
    - expression: >-
        !has(object.spec.type) ||
        object.spec.type != "NodePort"
      message: >-
        Services of type NodePort are not allowed. Use ClusterIP with an
        Ingress resource, or type LoadBalancer for external access.

---
# ------------------------------------------------------------------------------
# POLICY 5: Require Namespace Owner Label
# Namespaces without an owner label cannot be attributed to a team for cost
# reporting, incident response, or automated access provisioning.
# ------------------------------------------------------------------------------
apiVersion: policies.kyverno.io/v1
kind: ValidatingPolicy
metadata:
  name: require-namespace-owner-label
  annotations:
    policies.kyverno.io/title: Require Namespace Owner Label
    policies.kyverno.io/category: Governance
    policies.kyverno.io/severity: medium
    policies.kyverno.io/description: >-
      Every namespace must carry a team label for cost attribution, incident
      ownership, and automated access provisioning.
spec:
  validationActions: [Deny]
  matchConstraints:
    resourceRules:
      - apiGroups: [""]
        apiVersions: ["v1"]
        operations: ["CREATE", "UPDATE"]
        resources: ["namespaces"]
  matchConditions:
    - name: exclude-system-namespaces
      expression: >-
        !(object.metadata.name in [
          "kube-system", "kube-public", "default", "kube-node-lease",
          "kyverno", "argocd", "tanzu-package-repo-global", "tanzu-system",
          "vmware-system-auth", "vmware-system-cloud-provider",
          "vmware-system-csi", "vmware-system-tmc",
          "kubernetes-dashboard", "velero", "gatekeeper-system",
          "flux-system", "nginx-ingress", "monitoring", "calico-system",
          "istio-operator", "istio-system", "logging", "vault",
          "atlantis", "wiz", "kube-policy"])
  validations:
    - expression: >-
        has(object.metadata.labels) &&
        has(object.metadata.labels.team)
      messageExpression: >-
        "Namespace '" + object.metadata.name +
        "' must have a team label (e.g., team: platform)."
    - expression: >-
        has(object.metadata.labels) &&
        has(object.metadata.labels.env) &&
        object.metadata.labels.env in ["dev", "stg", "prod"]
      messageExpression: >-
        "Namespace '" + object.metadata.name +
        "' must have an env label with values test, dev, stg, nonprod, prod"

---
# ------------------------------------------------------------------------------
# POLICY 4: Require TLS on Ingress Resources
# Ingress without TLS serves traffic in cleartext, exposing credentials and
# data in transit to network-level attacks. Every Ingress must reference a
# TLS secret or use an annotation indicating cert-manager handles it.
# ------------------------------------------------------------------------------
apiVersion: policies.kyverno.io/v1
kind: ValidatingPolicy
metadata:
  name: require-ingress-tls
  annotations:
    policies.kyverno.io/title: Require TLS on Ingress
    policies.kyverno.io/category: Governance
    policies.kyverno.io/severity: high
    policies.kyverno.io/description: >-
      Ingress resources must configure TLS to prevent cleartext HTTP traffic.
      Define spec.tls with a secretName or use cert-manager annotations.
spec:
  validationActions: [Deny]
  matchConstraints:
    resourceRules:
      - apiGroups: ["networking.k8s.io"]
        apiVersions: ["v1"]
        operations: ["CREATE", "UPDATE"]
        resources: ["ingresses"]
  matchConditions:
    - name: exclude-system-namespaces
      expression: >-
        !(request.namespace in [
          "kube-system", "kube-public", "default", "kube-node-lease",
          "kyverno", "argocd", "tanzu-package-repo-global", "tanzu-system",
          "vmware-system-auth", "vmware-system-cloud-provider",
          "vmware-system-csi", "vmware-system-tmc",
          "kubernetes-dashboard", "velero", "gatekeeper-system",
          "flux-system", "nginx-ingress", "monitoring", "calico-system",
          "istio-operator", "istio-system", "logging", "vault",
          "atlantis", "wiz", "kube-policy"])
  validations:
    - expression: >-
        has(object.spec.tls) && size(object.spec.tls) > 0
      message: >-
        Ingress resources must configure spec.tls to enforce HTTPS.
        Add a tls block with secretName or use cert-manager annotations.

---
# ------------------------------------------------------------------------------
# POLICY 5: Restrict RBAC Wildcards in ClusterRoles
# ClusterRoles with verbs: ["*"] or resources: ["*"] are effectively
# cluster-admin. Even in a dev environment this creates massive blast radius.
# Audit mode — surface wildcard roles for review without blocking operations.
# ------------------------------------------------------------------------------
apiVersion: policies.kyverno.io/v1
kind: ValidatingPolicy
metadata:
  name: restrict-rbac-wildcards
  annotations:
    policies.kyverno.io/title: Restrict RBAC Wildcards
    policies.kyverno.io/category: Governance
    policies.kyverno.io/severity: high
    policies.kyverno.io/description: >-
      ClusterRoles with wildcard verbs or resources grant unrestricted access.
      This policy surfaces overly permissive RBAC roles for review.
spec:
  validationActions: [Audit]
  matchConstraints:
    resourceRules:
      - apiGroups: ["rbac.authorization.k8s.io"]
        apiVersions: ["v1"]
        operations: ["CREATE", "UPDATE"]
        resources: ["clusterroles"]
  validations:
    - expression: >-
        !has(object.rules) ||
        object.rules.all(r,
          !r.verbs.exists(v, v == "*")
        )
      messageExpression: >-
        "ClusterRole '" + object.metadata.name +
        "' uses wildcard verbs ['*']. Use explicit verb lists instead."
    - expression: >-
        !has(object.rules) ||
        object.rules.all(r,
          !r.resources.exists(res, res == "*")
        )
      messageExpression: >-
        "ClusterRole '" + object.metadata.name +
        "' uses wildcard resources ['*']. Use explicit resource lists instead."
