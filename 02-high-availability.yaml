# ==============================================================================
# HIGH AVAILABILITY POLICIES — Kyverno v1.17
# API: policies.kyverno.io/v1 | Kind: ValidatingPolicy
#
# Ensures workloads survive node failures, rolling updates, and maintenance
# windows. HA-critical policies use [Deny]; advisory ones use [Audit] until
# all workloads are compliant.
#
# Policies in this file:
#   • require-minimum-replicas       — >= 2 replicas required (ha-exempt label to opt out)
#   • require-liveness-probe         — restarts unhealthy containers automatically
#   • require-readiness-probe        — removes unready pods from Service load balancers
#   • require-pod-anti-affinity      — spreads replicas across nodes [Audit]
#   • require-pod-disruption-budget  — limits simultaneous evictions [Audit]
# ==============================================================================

---
# ------------------------------------------------------------------------------
# POLICY 1: Enforce Minimum Replicas (>=2)
# A Deployment with 1 replica is a single point of failure. Any pod eviction,
# node drain, or OOMKill causes a full outage. >= 2 guarantees continuity.
# Label ha-exempt: "true" to opt out (e.g., intentional singletons).
# ------------------------------------------------------------------------------
apiVersion: policies.kyverno.io/v1
kind: ValidatingPolicy
metadata:
  name: require-minimum-replicas
  annotations:
    policies.kyverno.io/title: Require Minimum Replicas
    policies.kyverno.io/category: High Availability
    policies.kyverno.io/severity: high
    policies.kyverno.io/description: >-
      Single-replica Deployments are a SPOF. Requiring replicas >= 2 ensures
      availability during pod restarts and node maintenance.
spec:
  validationActions: [Deny]
  matchConstraints:
    resourceRules:
      - apiGroups: ["apps"]
        apiVersions: ["v1"]
        operations: ["CREATE", "UPDATE"]
        resources: ["deployments"]
  matchConditions:
    - name: exclude-system-namespaces
      expression: >-
        !(request.namespace in [
          "kube-system", "kube-public", "default", "kube-node-lease",
          "kyverno", "argocd", "tanzu-package-repo-global", "tanzu-system",
          "vmware-system-auth", "vmware-system-cloud-provider",
          "vmware-system-csi", "vmware-system-tmc",
          "kubernetes-dashboard", "velero", "gatekeeper-system",
          "flux-system", "nginx-ingress", "monitoring", "calico-system",
          "istio-operator", "istio-system", "logging", "vault",
          "atlantis", "wiz", "kube-policy"])
    - name: exclude-ha-exempt
      expression: >-
        !(has(object.metadata.labels) &&
          has(object.metadata.labels["ha-exempt"]) &&
          object.metadata.labels["ha-exempt"] == "true")
  validations:
    - expression: >-
        has(object.spec.replicas) && object.spec.replicas >= 2
      messageExpression: >-
        "Deployment '" + object.metadata.name + "' has " +
        string(object.spec.replicas) + " replica(s). Minimum is 2. " +
        "Add label ha-exempt: 'true' for intentional singletons."

---
# ------------------------------------------------------------------------------
# POLICY 2: Require Liveness Probe
# Without a livenessProbe Kubernetes cannot detect a deadlocked process and
# will not restart it — the pod appears Running but serves no traffic.
# ------------------------------------------------------------------------------
apiVersion: policies.kyverno.io/v1
kind: ValidatingPolicy
metadata:
  name: require-liveness-probe
  annotations:
    policies.kyverno.io/title: Require Liveness Probe
    policies.kyverno.io/category: High Availability
    policies.kyverno.io/severity: high
    policies.kyverno.io/description: >-
      livenessProbe detects deadlocked processes and triggers pod restarts,
      preventing silent failures that look healthy to the scheduler.
spec:
  validationActions: [Deny]
  matchConstraints:
    resourceRules:
      - apiGroups: [""]
        apiVersions: ["v1"]
        operations: ["CREATE", "UPDATE"]
        resources: ["pods"]
  matchConditions:
    - name: exclude-system-namespaces
      expression: >-
        !(request.namespace in [
          "kube-system", "kube-public", "default", "kube-node-lease",
          "kyverno", "argocd", "tanzu-package-repo-global", "tanzu-system",
          "vmware-system-auth", "vmware-system-cloud-provider",
          "vmware-system-csi", "vmware-system-tmc",
          "kubernetes-dashboard", "velero", "gatekeeper-system",
          "flux-system", "nginx-ingress", "monitoring", "calico-system",
          "istio-operator", "istio-system", "logging", "vault",
          "atlantis", "wiz", "kube-policy"])
  validations:
    - expression: >-
        object.spec.containers.all(c, has(c.livenessProbe))
      message: >-
        All containers must define a livenessProbe (httpGet, tcpSocket, or exec).

---
# ------------------------------------------------------------------------------
# POLICY 3: Require Readiness Probe
# Without a readinessProbe traffic is sent to pods that are still initialising
# or temporarily unhealthy, causing request errors during deployments.
# ------------------------------------------------------------------------------
apiVersion: policies.kyverno.io/v1
kind: ValidatingPolicy
metadata:
  name: require-readiness-probe
  annotations:
    policies.kyverno.io/title: Require Readiness Probe
    policies.kyverno.io/category: High Availability
    policies.kyverno.io/severity: high
    policies.kyverno.io/description: >-
      readinessProbe prevents traffic from reaching pods that are not yet
      initialised or temporarily unhealthy, avoiding request errors.
spec:
  validationActions: [Deny]
  matchConstraints:
    resourceRules:
      - apiGroups: [""]
        apiVersions: ["v1"]
        operations: ["CREATE", "UPDATE"]
        resources: ["pods"]
  matchConditions:
    - name: exclude-system-namespaces
      expression: >-
        !(request.namespace in [
          "kube-system", "kube-public", "default", "kube-node-lease",
          "kyverno", "argocd", "tanzu-package-repo-global", "tanzu-system",
          "vmware-system-auth", "vmware-system-cloud-provider",
          "vmware-system-csi", "vmware-system-tmc",
          "kubernetes-dashboard", "velero", "gatekeeper-system",
          "flux-system", "nginx-ingress", "monitoring", "calico-system",
          "istio-operator", "istio-system", "logging", "vault",
          "atlantis", "wiz", "kube-policy"])
  validations:
    - expression: >-
        object.spec.containers.all(c, has(c.readinessProbe))
      message: >-
        All containers must define a readinessProbe (httpGet, tcpSocket, or exec).

---
# ------------------------------------------------------------------------------
# POLICY 4: Require Pod Anti-Affinity or TopologySpreadConstraints
# Without anti-affinity all replicas may land on the same node. A single node
# failure then takes down the entire service.
# Anti-affinity or topologySpreadConstraints distributes pods across nodes.
# Runs in Audit initially — promote to Deny once teams have added affinity rules.
# ------------------------------------------------------------------------------
apiVersion: policies.kyverno.io/v1
kind: ValidatingPolicy
metadata:
  name: require-pod-anti-affinity
  annotations:
    policies.kyverno.io/title: Require Pod Anti-Affinity or TopologySpreadConstraints
    policies.kyverno.io/category: High Availability
    policies.kyverno.io/severity: medium
    policies.kyverno.io/description: >-
      Without anti-affinity a node failure takes down all replicas. This policy
      enforces distribution rules to ensure true multi-node redundancy.
spec:
  validationActions: [Audit]
  matchConstraints:
    resourceRules:
      - apiGroups: ["apps"]
        apiVersions: ["v1"]
        operations: ["CREATE", "UPDATE"]
        resources: ["deployments"]
  matchConditions:
    - name: exclude-system-namespaces
      expression: >-
        !(request.namespace in [
          "kube-system", "kube-public", "default", "kube-node-lease",
          "kyverno", "argocd", "tanzu-package-repo-global", "tanzu-system",
          "vmware-system-auth", "vmware-system-cloud-provider",
          "vmware-system-csi", "vmware-system-tmc",
          "kubernetes-dashboard", "velero", "gatekeeper-system",
          "flux-system", "nginx-ingress", "monitoring", "calico-system",
          "istio-operator", "istio-system", "logging", "vault",
          "atlantis", "wiz", "kube-policy"])
    - name: exclude-ha-exempt
      expression: >-
        !(has(object.metadata.labels) &&
          has(object.metadata.labels["ha-exempt"]) &&
          object.metadata.labels["ha-exempt"] == "true")
  validations:
    - expression: >-
        (
          has(object.spec.template.spec.affinity) &&
          has(object.spec.template.spec.affinity.podAntiAffinity)
        ) ||
        (
          has(object.spec.template.spec.topologySpreadConstraints) &&
          size(object.spec.template.spec.topologySpreadConstraints) > 0
        )
      message: >-
        Deployments must define either affinity.podAntiAffinity or
        topologySpreadConstraints to spread pods across nodes/zones.

---
# ------------------------------------------------------------------------------
# POLICY 5: Require PodDisruptionBudget
# Without a PDB, kubectl drain can evict ALL replicas simultaneously during
# node maintenance, causing a full outage even for multi-replica Deployments.
# A PDB guarantees a minimum number of replicas stay available during voluntary
# disruptions (node upgrades, cluster autoscaler, spot evictions).
# Audit mode — promote to Deny once teams have created PDBs.
# ------------------------------------------------------------------------------
apiVersion: policies.kyverno.io/v1
kind: ValidatingPolicy
metadata:
  name: require-pod-disruption-budget
  annotations:
    policies.kyverno.io/title: Require PodDisruptionBudget
    policies.kyverno.io/category: High Availability
    policies.kyverno.io/severity: high
    policies.kyverno.io/description: >-
      Without a PDB, node drains can evict all replicas at once. This policy
      requires Deployments with 2+ replicas to have a matching PDB.
spec:
  validationActions: [Audit]
  matchConstraints:
    resourceRules:
      - apiGroups: ["apps"]
        apiVersions: ["v1"]
        operations: ["CREATE", "UPDATE"]
        resources: ["deployments"]
  matchConditions:
    - name: exclude-system-namespaces
      expression: >-
        !(request.namespace in [
          "kube-system", "kube-public", "default", "kube-node-lease",
          "kyverno", "argocd", "tanzu-package-repo-global", "tanzu-system",
          "vmware-system-auth", "vmware-system-cloud-provider",
          "vmware-system-csi", "vmware-system-tmc",
          "kubernetes-dashboard", "velero", "gatekeeper-system",
          "flux-system", "nginx-ingress", "monitoring", "calico-system",
          "istio-operator", "istio-system", "logging", "vault",
          "atlantis", "wiz", "kube-policy"])
    - name: exclude-ha-exempt
      expression: >-
        !(has(object.metadata.labels) &&
          has(object.metadata.labels["ha-exempt"]) &&
          object.metadata.labels["ha-exempt"] == "true")
    - name: multi-replica-only
      expression: >-
        has(object.spec.replicas) && object.spec.replicas >= 2
  validations:
    - expression: >-
        has(object.metadata.labels) &&
        has(object.metadata.labels["pdb-configured"]) &&
        object.metadata.labels["pdb-configured"] == "true"
      messageExpression: >-
        "Deployment '" + object.metadata.name +
        "' has " + string(object.spec.replicas) +
        " replicas but no PodDisruptionBudget. Create a PDB and add label pdb-configured: 'true'."
